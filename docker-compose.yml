secrets:
  jira_auth_token:
    file: ./secrets/jira_auth_token
  jira_auth_user:
    file: ./secrets/jira_auth_user
  jira_domain:
    file: ./secrets/jira_domain
  syncthing_metrics_token:
    file: ./secrets/syncthing_metrics_token

services:
  atc1441-exporter:
    container_name: atc1441-exporter
    image: quay.io/thekevjames/atc1441-exporter:0.1.8
    command: --port=9091 /app/config.ini
    restart: unless-stopped
    environment:
      - DEBUG=false
    network_mode: host
    privileged: true
    volumes:
      - ./config/atc1441/config.ini:/app/config.ini:Z

  bazarr:
    container_name: bazarr
    image: quay.io/linuxserver.io/bazarr:1.6.0
    restart: unless-stopped
    ports:
      - 6767:6767/tcp
    environment:
      - PGID=1000
      - PUID=1000
      - TZ=Etc/UTC
      - UMASK=002
    volumes:
      - ./data/bazarr:/config:Z
      - /mnt/4tb/movies:/data/media/movies
      - /mnt/4tb/shows:/data/media/shows

  caddy:
    container_name: caddy
    image: quay.io/thekevjames/caddy-security:2.7.6-1.1.22
    command: caddy run --config /config/caddy/Caddyfile --adapter caddyfile
    restart: unless-stopped
    ports:
      - 2019:2019/tcp
    env_file:
      - ./secrets/google.env
    volumes:
      - ./config/caddy:/config/caddy:Z

  cloudflared:
    container_name: cloudflared
    image: docker.io/cloudflare/cloudflared:2026.7.1@sha256:188bb03589a32affed3cf4d0590565ffe67b78866e6b5582574afab2b705bafe
    command: tunnel --metrics 0.0.0.0:20241 run
    restart: unless-stopped
    volumes:
      - ./data/cloudflared:/home/nonroot/.cloudflared:Z

  docker-socket-proxy:
    container_name: docker-socket-proxy
    image: ghcr.io/tecnativa/docker-socket-proxy:v0.4.2
    restart: unless-stopped
    environment:
      - CONTAINERS=1
      - POST=0
      - SERVICES=0
      - TASKS=0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  dolce:
    container_name: dolce
    image: dangrie158/dolce:v4.0.2
    restart: unless-stopped
    env_file:
      - ./secrets/dolce.env
    environment:
      # TODO: get socket proxy to work
      # - DOCKER_HOST=docker-socket-proxy:2375
      # - DOCKER_TRANSPORT=tcp
      - DOLCE_EVENTS=start,die,kill,oom,stop,pause,unpause,health_status
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  fava:
    container_name: fava
    image: quay.io/thekevjames/fava:1.30.14
    command: /data/finance/index.beancount
    restart: unless-stopped
    volumes:
      - /mnt/4tb/sync/finance:/data/finance

  gerbera:
    container_name: gerbera
    image: gerbera/gerbera:3.2.1
    command: gerbera -p 49152 -c /etc/gerbera/config.xml
    restart: unless-stopped
    environment:
      - PGID=1000
      - PUID=1000
      - TZ=Etc/UTC
    network_mode: host
    volumes:
      - ./data/gerbera:/etc/gerbera:Z
      - /mnt/4tb/movies:/content/movies:ro
      - /mnt/4tb/shows:/content/shows:ro
      - gerbera:/var/run/gerbera

  homepage:
    container_name: homepage
    image: ghcr.io/gethomepage/homepage:v1.13.2
    restart: unless-stopped
    env_file:
      - ./secrets/homepage.env
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=home.thekev.in
    volumes:
      - /mnt/1tb:/mnt/1tb
      - /mnt/4tb:/mnt/4tb
      - ./config/homepage:/app/config:Z

  immich-machine-learning:
    container_name: immich-machine-learning
    # For hardware acceleration, add one of -[armnn, cuda, rocm, openvino, rknn] to the image tag.
    # Example tag: ${IMMICH_VERSION:-release}-cuda
    image: ghcr.io/immich-app/immich-machine-learning:v2.7.5
    # extends: # uncomment this section for hardware acceleration - see https://docs.immich.app/features/ml-hardware-acceleration
    #   file: hwaccel.ml.yml
    #   service: cpu # set to one of [armnn, cuda, rocm, openvino, openvino-wsl, rknn] for accelerated inference - use the `-wsl` version for WSL2 where applicable
    restart: always
    user: '1000:1000'
    env_file:
      - config/immich/config.env
      - secrets/immich.env
    volumes:
      - model-cache:/cache
    healthcheck:
      disable: false

  immich-postgres:
    container_name: immich-postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3
    restart: always
    environment:
      POSTGRES_INITDB_ARGS: '--data-checksums'
    env_file:
      - config/immich/config.env
      - secrets/immich.env
    volumes:
      - ./data/immich/postgres:/var/lib/postgresql/data
    shm_size: 128mb
    healthcheck:
      disable: false

  immich-redis:
    container_name: immich-redis
    image: docker.io/valkey/valkey:9.1.0
    restart: always
    healthcheck:
      test: redis-cli ping || exit 1

  immich-server:
    container_name: immich-server
    image: ghcr.io/immich-app/immich-server:v2.7.5
    # extends:
    #   file: hwaccel.transcoding.yml
    #   service: cpu # set to one of [nvenc, quicksync, rkmpp, vaapi, vaapi-wsl] for accelerated transcoding
    restart: always
    user: '1000:1000'
    ports:
      - '2283:2283'
    env_file:
      - config/immich/config.env
      - secrets/immich.env
    volumes:
      - /mnt/4tb/backup/library:/data
      - /mnt/4tb/backup/library-bigfiles:/mnt/bigfiles:ro
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - immich-postgres
      - immich-redis
    healthcheck:
      disable: false

  jellyfin:
    container_name: jellyfin
    image: quay.io/linuxserver.io/jellyfin:10.11.11
    restart: unless-stopped
    ports:
      - 7359:7359/udp
      - 8096:8096/tcp
    environment:
      - PGID=1000
      - PUID=1000
      - TZ=Etc/UTC
      - UMASK=002
    volumes:
      - /mnt/4tb/movies:/data/media/movies
      - /mnt/4tb/shows:/data/media/shows
      - ./data/jellyfin:/config:Z
      # https://github.com/linuxserver/docker-jellyfin/blob/master/root/etc/s6-overlay/s6-rc.d/svc-jellyfin/run
      # jellyfin's DB lives at /config/data, now under the ./data/jellyfin bind mount
      - /config/cache
      - /config/log

  jellyfin-exporter:
    container_name: jellyfin-exporter
    image: docker.io/rebelcore/jellyfin-exporter:v1.5.2
    restart: unless-stopped
    environment:
      - JELLYFIN_ADDRESS=http://jellyfin:8096
    env_file:
      - ./secrets/jellyfin.env
    depends_on:
      - jellyfin

  mosura:
    container_name: mosura
    image: quay.io/thekevjames/mosura:latest
    restart: unless-stopped
    environment:
      - MOSURA_APPDATA=/data
      - MOSURA_LOG_LEVEL=INFO
      - MOSURA_PORT=8080
    secrets:
      - jira_auth_token
      - jira_auth_user
      - jira_domain
    volumes:
      - ./data/mosura:/data:Z

  netdata:
    container_name: netdata
    image: netdata/netdata:v2.10.3
    restart: unless-stopped
    init: true
    ports:
      - 19999:19999
    environment:
      - DOCKER_HOST=docker-socket-proxy:2375
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE
    security_opt:
      - apparmor:unconfined
    volumes:
      - ./config/netdata:/etc/netdata:Z
      - netdata-cache:/var/cache/netdata
      - netdata-lib:/var/lib/netdata
      - /:/host/root:ro,rslave
      - /etc/group:/host/etc/group:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /etc/passwd:/host/etc/passwd:ro
      - /proc:/host/proc:ro
      - /run/dbus:/run/dbus:ro
      - /sys:/host/sys:ro
      - /var/log:/host/var/log:ro
    secrets:
      - syncthing_metrics_token

  n8n:
    container_name: n8n
    image: docker.n8n.io/n8nio/n8n:2.30.1
    restart: unless-stopped
    environment:
      - GENERIC_TIMEZONE=Etc/UTC
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=false
      - N8N_METRICS=true
      - N8N_METRICS_INCLUDE_QUEUE_METRICS=true
      - N8N_HOST=n8n.thekev.in
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - N8N_NATIVE_PYTHON_RUNNER=true
      - N8N_RUNNERS_AUTH_TOKEN=no-need-to-be-secret
      - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=0.0.0.0
      - N8N_RUNNERS_ENABLED=true
      - N8N_RUNNERS_MODE=external
      - NODE_ENV=production
      - NODES_EXCLUDE="[]"
      - WEBHOOK_URL=https://n8n.thekev.in/
    volumes:
      - ./config/n8n:/files
      - ./data/n8n/data:/home/node/.n8n
      # TODO: backup crontab
      # */1 * * * * cp /proc/net/arp /home/kevin/src/personal/selfhost/data/n8n/files/host.arp
      - ./data/n8n/files:/home/node/.n8n-files

  n8n-runners:
    container_name: n8n-runners
    image: docker.io/n8nio/runners:2.30.1
    restart: unless-stopped
    environment:
      - N8N_RUNNERS_AUTH_TOKEN=no-need-to-be-secret
      - N8N_RUNNERS_AUTO_SHUTDOWN_TIMEOUT=0
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n:5679
    depends_on:
      - n8n

  pihole:
    container_name: pihole
    image: docker.io/pihole/pihole:2026.07.2
    restart: unless-stopped
    ports:
      - 53:53/tcp
      - 53:53/udp
      - 8888:80
    environment:
      - DNSMASQ_LISTENING=all
      - TZ=Etc/UTC
    volumes:
      - ./data/pihole/config:/etc/pihole:Z
      - ./data/pihole/dnsmasq:/etc/dnsmasq.d:Z

  prowlarr:
    container_name: prowlarr
    image: quay.io/linuxserver.io/prowlarr:2.4.0
    restart: unless-stopped
    ports:
      - 9696:9696/tcp
    environment:
      - PGID=1000
      - PUID=1000
      - TZ=Etc/UTC
      - UMASK=002
    volumes:
      - ./data/prowlarr:/config:Z

  qbittorrent:
    container_name: qbittorrent
    image: ghcr.io/hotio/qbittorrent:release-5.2.3
    restart: unless-stopped
    ports:
      - 8089:8080/tcp
    environment:
      - PGID=1000
      - PUID=1000
      - TZ=Etc/UTC
      - UMASK=002
    volumes:
      - /mnt/1tb/torrents:/data/torrents
      - ./data/qbittorrent:/config:Z

  qbittorrent-exporter:
    container_name: qbittorrent-exporter
    image: ghcr.io/martabal/qbittorrent-exporter:v2.0.1
    restart: unless-stopped
    environment:
      - QBITTORRENT_BASE_URL=http://qbittorrent:8080
      # Authenticate with username/password rather than a generated API key, so
      # no plaintext token is written into the tracked qBittorrent.conf. The
      # 5.2+ session cookie is QBT_SID_<WebUI\Port> (8080 here).
      - QBITTORRENT_COOKIE_NAME=QBT_SID_8080
    env_file:
      - ./secrets/qbittorrent.env
    depends_on:
      - qbittorrent

  radarr:
    container_name: radarr
    image: quay.io/linuxserver.io/radarr:6.2.1
    restart: unless-stopped
    ports:
      - 7878:7878/tcp
    environment:
      - PGID=1000
      - PUID=1000
      - TZ=Etc/UTC
      - UMASK=002
    volumes:
      - /mnt/1tb/torrents:/data/torrents
      - /mnt/4tb/movies:/data/media/movies
      - ./data/radarr:/config:Z

  scraparr:
    container_name: scraparr
    image: ghcr.io/thecfu/scraparr:3.0.3
    restart: unless-stopped
    environment:
      - BAZARR_URL=http://bazarr:6767
      - PROWLARR_URL=http://prowlarr:9696
      - RADARR_URL=http://radarr:7878
      - SONARR_URL=http://sonarr:8989
    env_file:
      - ./secrets/scraparr.env
    depends_on:
      - bazarr
      - prowlarr
      - radarr
      - sonarr

  sonarr:
    container_name: sonarr
    image: quay.io/linuxserver.io/sonarr:4.0.19
    restart: unless-stopped
    ports:
      - 8989:8989/tcp
    environment:
      - PGID=1000
      - PUID=1000
      - TZ=Etc/UTC
      - UMASK=002
    volumes:
      - /mnt/1tb/torrents:/data/torrents
      - /mnt/4tb/shows:/data/media/shows
      - ./data/sonarr:/config:Z

  syncthing:
    container_name: syncthing
    image: quay.io/linuxserver.io/syncthing:2.1.2
    restart: unless-stopped
    ports:
      - 8384:8384
      - 22000:22000/tcp
      - 22000:22000/udp
      - 21027:21027/udp
    environment:
      - PGID=1000
      - PUID=1000
      - TZ=Etc/UTC
      - UMASK=002
    volumes:
      - /mnt/4tb/backup:/data/backup
      - /mnt/4tb/sync:/data/sync
      - ./data/syncthing:/config:Z

  unpackerr:
    container_name: unpackerr
    image: ghcr.io/hotio/unpackerr:release-0.15.2
    restart: unless-stopped
    environment:
      - PGID=1000
      - PUID=1000
      - TZ=Etc/UTC
      - UMASK=002
    volumes:
      - /mnt/1tb/torrents:/data/torrents
      - ./config/unpackerr:/config:Z

# Persistent app state lives under ./data; these named volumes
# hold only regenerable caches / runtime scratch and are intentionally excluded
# from backups.
volumes:
  gerbera: {}
  model-cache: {}
  netdata-cache: {}
  netdata-lib: {}
